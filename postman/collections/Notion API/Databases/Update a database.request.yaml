$kind: http-request
url: https://api.notion.com/v1/databases/:id
method: PATCH
headers:
  Notion-Version: "{{NOTION_VERSION}}"
pathVariables:
  id: ""
body:
  type: json
  content: |-
    {
        "title": [
            {
                "text": {
                    "content": "Ever Better Reading List Title"
                }
            }
        ],
        "properties":{
            "Wine Pairing": { "rich_text": {} } 
        }
    }
examples: ./.resources/Update a database.resources/examples
order: 4000
