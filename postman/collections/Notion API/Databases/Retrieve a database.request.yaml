$kind: http-request
description: "Retrieves a database object using the ID specified in the request path. "
url: https://api.notion.com/v1/databases/:id
method: GET
headers:
  Notion-Version: "{{NOTION_VERSION}}"
pathVariables:
  id: "{{DATABASE_ID}}"
examples: ./.resources/Retrieve a database.resources/examples
order: 1000
